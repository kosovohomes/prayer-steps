<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFCDA9" />
  <title>ABC of Islam · Prayer Steps Carousel · Huge Buttons Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ---------- very light peach palette + 9:16 ratio ---------- */
    :root {
      --peach-50:  #FFF8F2;
      --peach-100: #FFEFE2;
      --peach-300: #FFD6BE;
      --peach-500: #FFBC91;
      --peach-700: #EB9A6E;
      --peach-900: #C27748;
      --pink-300: #FCA9C1;
      --pink-500: #F77AA0;
      --cream-50: #FFFBF5;
      --cream-100: #FEF6EA;
      --ink-900: #362515;
      --ink-700: #5C3F28;
      --shadow-md: 0 14px 32px -12px rgba(88, 55, 28, 0.2);
      --shadow-lg: 0 28px 60px -18px rgba(88, 55, 28, 0.3);
      --radius-card: 32px;
      --radius-pill: 999px;
      --t-fast: 180ms cubic-bezier(.4, 0, .2, 1);
      --t-med:  420ms cubic-bezier(.4, 0, .2, 1);
      --t-slow: 600ms cubic-bezier(.4, 0, .2, 1);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Fredoka", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink-900);
      background:
        radial-gradient(1100px 800px at 12% -10%, var(--peach-100) 0%, transparent 60%),
        radial-gradient(950px 700px at 110% 110%, #FFE4DC 0%, transparent 55%),
        linear-gradient(145deg, var(--cream-50) 0%, #FFF9F0 100%);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* decorative stars */
    .bg-decor { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-decor .star {
      position: absolute; width: 28px; height: 28px; opacity: 0.4;
      background: radial-gradient(circle at 30% 30%, #fff 0 30%, #FFD1A6 32% 60%, transparent 62%);
      filter: drop-shadow(0 2px 2px rgba(230, 140, 70, 0.2));
      animation: twinkle 5s ease-in-out infinite;
    }
    .bg-decor .star.s2 { background: radial-gradient(circle at 30% 30%, #fff 0 30%, var(--pink-300) 32% 60%, transparent 62%); }
    .bg-decor .star.s3 { background: radial-gradient(circle at 30% 30%, #fff 0 30%, var(--peach-500) 32% 60%, transparent 62%); }
    .bg-decor .b1 { top: 6%;  left: 6%;  }
    .bg-decor .b2 { top: 12%; right: 8%; width: 36px; height: 36px; animation-delay: .4s; }
    .bg-decor .b3 { top: 60%; left: 4%;  width: 22px; height: 22px; animation-delay: 1.2s; }
    .bg-decor .b4 { top: 78%; right: 6%; width: 32px; height: 32px; animation-delay: 1.8s; }
    .bg-decor .b5 { top: 45%; right: 18%; width: 18px; height: 18px; animation-delay: .8s; }
    .bg-decor .b6 { top: 28%; left: 38%; width: 20px; height: 20px; animation-delay: 2.2s; }
    @keyframes twinkle {
      0%,100% { transform: scale(1) rotate(0deg); opacity: 0.35; }
      50%     { transform: scale(1.2) rotate(12deg); opacity: 0.7; }
    }

    /* layout */
    .page {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: clamp(16px, 3vw, 28px);
      display: flex; flex-direction: column; gap: 16px;
      min-height: 100dvh;
    }

    /* header with clickable logo image */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none;
      transition: transform 0.2s ease;
      cursor: pointer;
    }
    .brand:hover {
      transform: scale(1.02);
    }
    .brand .logo-img {
      height: 46px;
      width: auto;
      max-width: 180px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.05));
    }
    .toolbar { display: inline-flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 14px;
      border: 2px solid var(--peach-100);
      background: #fff; color: var(--peach-700);
      display: grid; place-items: center; cursor: pointer;
      transition: transform var(--t-fast), background var(--t-fast), border-color var(--t-fast);
    }
    .icon-btn:hover { background: var(--peach-50); border-color: var(--peach-300); transform: translateY(-1px); }
    .icon-btn:active { transform: translateY(0); }
    .icon-btn svg { width: 18px; height: 18px; }
    .icon-btn[aria-pressed="true"] { background: var(--peach-500); color: #fff; border-color: var(--peach-500); }
    .voice-btn {
      background: linear-gradient(145deg, #FFE0C4, #FFD2B0);
      border-color: var(--peach-300);
      color: var(--peach-900);
    }
    .voice-btn:hover { background: var(--peach-300); }

    /* stage + carousel with 9:16 ratio */
    .stage {
      position: relative;
      flex: 1; min-height: 0;
      display: grid; place-items: center;
      perspective: 1200px;
    }
    .carousel {
      position: relative;
      width: 100%;
      max-width: 350px;
      aspect-ratio: 9 / 16;
      max-height: min(72dvh, 620px);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius-card);
      background: #FFF3E8;
    }

    /* slide */
    .slide {
      position: absolute; inset: 0;
      border-radius: var(--radius-card);
      overflow: hidden;
      background: #FFFCF8;
      box-shadow: 0 18px 32px -12px rgba(0,0,0,0.15);
      transform: translateX(0) scale(1);
      opacity: 1;
      transition: transform var(--t-slow), opacity var(--t-slow), filter var(--t-slow);
      will-change: transform, opacity;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide.dragging { cursor: grabbing; }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      background: #FFF3E8;
    }

    .slide[data-state="active"]   { transform: translateX(0)      scale(1);    opacity: 1;  filter: none;              z-index: 3; }
    .slide[data-state="prev"]     { transform: translateX(-105%)  scale(.88);  opacity: 0;  filter: blur(2px);         z-index: 2; pointer-events: none; }
    .slide[data-state="next"]     { transform: translateX( 105%)  scale(.88);  opacity: 0;  filter: blur(2px);         z-index: 2; pointer-events: none; }
    .slide[data-state="far-prev"] { transform: translateX(-160%)  scale(.78);  opacity: 0;  filter: blur(4px);         z-index: 1; pointer-events: none; }
    .slide[data-state="far-next"] { transform: translateX( 160%)  scale(.78);  opacity: 0;  filter: blur(4px);         z-index: 1; pointer-events: none; }
    .slide[data-state="hidden"]   { opacity: 0; pointer-events: none; visibility: hidden; }

    .slide::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 35%, rgba(255,235,210,0.15) 50%, transparent 65%);
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    .nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid #fff;
      background: linear-gradient(135deg, var(--peach-500), var(--peach-700));
      color: #fff; cursor: pointer; z-index: 5;
      display: grid; place-items: center;
      box-shadow: 0 12px 18px -6px rgba(136, 76, 38, 0.3);
      transition: transform var(--t-fast), box-shadow var(--t-fast), opacity var(--t-fast);
    }
    .nav:hover  { transform: translateY(-50%) scale(1.05); box-shadow: 0 16px 26px -8px rgba(136, 76, 38, 0.4); background: linear-gradient(135deg, var(--peach-600), var(--peach-800)); }
    .nav:active { transform: translateY(-50%) scale(.96); }
    .nav:disabled { opacity: .3; cursor: not-allowed; background: var(--peach-300); }
    .nav svg { width: 22px; height: 22px; }
    .nav.prev { left: -10px; }
    .nav.next { right: -10px; }
    @media (max-width: 560px) {
      .nav.prev { left: 4px; }
      .nav.next { right: 4px; }
      .nav { width: 42px; height: 42px; }
    }

    /* controls + nav buttons row */
    .controls {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      margin-top: 8px;
    }
    .counter {
      font-family: "Baloo 2", sans-serif; font-weight: 700;
      color: var(--peach-900);
      background: #fff;
      border: 2px dashed var(--peach-200);
      background-color: #FFFDF9;
      padding: 6px 18px; border-radius: var(--radius-pill);
      font-size: .9rem; letter-spacing: .5px;
    }
    .counter strong { color: var(--pink-500); }
    .dots { display: inline-flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--peach-300);
      border: none; padding: 0; cursor: pointer;
      transition: width var(--t-fast), background var(--t-fast), transform var(--t-fast);
    }
    .dot:hover { background: var(--peach-500); transform: scale(1.2); }
    .dot[aria-current="true"] {
      width: 28px; border-radius: var(--radius-pill);
      background: linear-gradient(90deg, var(--peach-500), var(--pink-500));
    }

    .progress {
      position: absolute; left: 18px; right: 18px; top: 16px;
      height: 4px; border-radius: 6px; background: rgba(255,240,220,0.7);
      overflow: hidden; z-index: 4; opacity: 0; transition: opacity var(--t-fast);
      backdrop-filter: blur(2px);
    }
    .progress.on { opacity: 1; }
    .progress > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #FFC48D, var(--pink-500));
      border-radius: 6px;
    }

    .caption {
      font-family: "Baloo 2", "Fredoka", sans-serif;
      font-weight: 700; color: var(--ink-700);
      text-align: center; font-size: 1.05rem;
      max-width: 460px;
      background: rgba(255, 248, 240, 0.7);
      backdrop-filter: blur(2px);
      padding: 6px 16px;
      border-radius: 60px;
    }
    .caption .step {
      display: inline-block;
      background: linear-gradient(135deg, #FFD9AE, #FFC28A);
      color: var(--ink-900);
      padding: 2px 12px; border-radius: var(--radius-pill);
      margin-right: 8px; font-size: .75rem; letter-spacing: .5px;
      font-weight: 800;
    }

    /* ----- HUGE NAVIGATION BUTTONS: 100% BIGGER (double the size) ----- */
    .nav-links-row {
      margin-top: 12px;
      margin-bottom: 8px;
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      padding-bottom: 12px;
    }
    .nav-buttons-container {
      display: flex;
      gap: 24px;               /* extra spacing for huge buttons */
      justify-content: flex-start;
      align-items: center;
      padding: 12px 8px;
      min-width: min-content;
    }
    /* Desktop: double original 84px → 168px width */
    .nav-icon-btn {
      flex-shrink: 0;
      width: 168px;            /* 100% bigger than previous 84px */
      background: #fff;
      border-radius: 48px;     /* more rounded for huge look */
      padding: 16px 12px;
      border: 3px solid var(--peach-200);
      background: #FFFEFA;
      box-shadow: 0 12px 20px -10px rgba(0,0,0,0.12);
      transition: all 0.2s ease;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .nav-icon-btn:hover {
      transform: translateY(-6px);
      border-color: var(--peach-500);
      box-shadow: 0 20px 28px -12px rgba(0,0,0,0.2);
    }
    .nav-icon-btn img {
      width: 100%;
      max-width: 140px;        /* allow much larger images */
      height: auto;
      display: block;
      object-fit: contain;
    }
    /* Mobile: double previous mobile size (74px → 148px) */
    @media (max-width: 640px) {
      .nav-icon-btn {
        width: 148px;
        padding: 12px 10px;
        border-radius: 40px;
      }
      .nav-icon-btn img {
        max-width: 120px;
      }
      .nav-buttons-container {
        gap: 18px;
      }
    }
    /* Very small devices: keep slightly smaller but still huge */
    @media (max-width: 480px) {
      .nav-icon-btn {
        width: 130px;
        padding: 10px 8px;
      }
      .nav-icon-btn img {
        max-width: 105px;
      }
      .nav-buttons-container {
        gap: 14px;
      }
    }

    @media (max-width: 540px) {
      .carousel { max-width: 86vw; }
      .caption { font-size: .9rem; backdrop-filter: none; background: transparent; }
    }
    .nav:focus-visible, .icon-btn:focus-visible, .dot:focus-visible, .nav-icon-btn:focus-visible {
      outline: 3px solid var(--peach-500); outline-offset: 3px;
    }
    @media (prefers-reduced-motion: reduce) {
      .slide, .bg-decor .star { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="bg-decor" aria-hidden="true">
    <span class="star b1"></span>
    <span class="star s2 b2"></span>
    <span class="star s3 b3"></span>
    <span class="star b4"></span>
    <span class="star s2 b5"></span>
    <span class="star s3 b6"></span>
  </div>

  <main class="page">
    <header class="app-header">
      <!-- clickable logo image linking to abcofislam.com -->
      <a href="https://abcofislam.com" class="brand" target="_blank" rel="noopener noreferrer" aria-label="ABC of Islam homepage">
        <img src="https://ik.imagekit.io/4zbzbdytp/ABC_of_ISLAM-removebg-preview.png?updatedAt=1781355294472" 
             alt="ABC of Islam logo" class="logo-img" />
      </a>
      <div class="toolbar" role="group" aria-label="Carousel tools">
        <button class="icon-btn voice-btn" id="voiceBtn" aria-label="Read current slide text aloud" title="Listen to description">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="18" height="18">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </button>
        <button class="icon-btn" id="autoplayBtn" aria-pressed="false" aria-label="Toggle autoplay" title="Toggle autoplay">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path id="autoplayIcon" d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <button class="icon-btn" id="fsBtn" aria-label="Toggle fullscreen" title="Fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 9V4h5"/><path d="M20 9V4h-5"/><path d="M4 15v5h5"/><path d="M20 15v5h-5"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="stage" aria-roledescription="carousel" aria-label="ABC of Islam prayer steps">
      <button class="nav prev" id="prevBtn" aria-label="Previous slide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 6l-6 6 6 6"/>
        </svg>
      </button>

      <div class="carousel" id="carousel" tabindex="0" aria-live="polite">
        <div class="progress" id="progress" aria-hidden="true"><i></i></div>
        <!-- slides injected by JS -->
      </div>

      <button class="nav next" id="nextBtn" aria-label="Next slide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 6l6 6-6 6"/>
        </svg>
      </button>
    </section>

    <div class="controls">
      <div class="caption" id="caption">
        <span class="step">Cover</span> <span id="captionText">Welcome! Learn the beautiful steps of Salah (prayer).</span>
      </div>
      <div class="dots" id="dots" role="tablist" aria-label="Choose slide"></div>
      <div class="counter" id="counter"><span id="cur">1</span> / <strong id="total">13</strong></div>
    </div>

    <!-- Navigation buttons row (section links) - now 100% bigger (doubled size) -->
    <div class="nav-links-row">
      <div class="nav-buttons-container" id="navButtonsRow"></div>
    </div>
  </main>

  <script>
    /* ---------- complete set of 13 unique prayer images ---------- */
    const slides = [
      { src: "https://ik.imagekit.io/4zbzbdytp/abc_islam_logo_1.png?updatedAt=1781449111569", label: "🌙 ABC of Islam", text: "Welcome to the prayer journey! Discover the beauty of Salah, step by step." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_01_what_is_salah.png?updatedAt=1781391660860", label: "📖 What is Salah?", text: "Salah is the second pillar of Islam — a direct connection between a believer and Allah." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_02_five_daily_prayers.png?updatedAt=1781391661990", label: "⏰ Five Daily Prayers", text: "Fajr, Dhuhr, Asr, Maghrib, Isha — five special moments to remember Allah every day." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_03_wudu.png?updatedAt=1781391662355", label: "💧 Wudu (Ablution)", text: "Purify yourself with water before prayer. Cleanliness is half of faith." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_04_facing_qiblah.png?updatedAt=1781391662496", label: "🕋 Facing the Qiblah", text: "Muslims around the world face the Kaaba in Makkah during Salah — a symbol of unity." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_05_niyyah.png?updatedAt=1781391660765", label: "❤️ Niyyah (Intention)", text: "Begin with a sincere intention in your heart. Which prayer are you about to offer?" },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_06_takbir.png?updatedAt=1781391660313", label: "📢 Takbir", text: "Raise your hands and say 'Allahu Akbar' (Allah is the Greatest). The prayer has begun." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_09_standing_after_ruku.png?updatedAt=1781391662306", label: "🧎‍♂️ Standing after Ruku", text: "Rise up and say 'Sami Allahu liman hamidah' — Allah hears those who praise Him." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_10_first_sujood.png?updatedAt=1781391661625", label: "🕌 First Sujood (Prostration)", text: "Place your forehead on the ground, glorify Allah: 'Subhana Rabbiyal A'la'." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_11_sitting_between_sujoods.png?updatedAt=1781391661208", label: "🧘 Sitting Between Sujoods", text: "Sit briefly, ask for forgiveness, then prepare for the second prostration." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_12_second_sujood.png?updatedAt=1781391659589", label: "🕌 Second Sujood", text: "Prostrate again, repeating the same dhikr. One rak'ah is now complete." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_13_tashahhud.png?updatedAt=1781391661070", label: "🙏 Tashahhud", text: "Sit and recite the testimony of faith, sending blessings upon the Prophet (ﷺ)." },
      { src: "https://ik.imagekit.io/4zbzbdytp/card_15_complete_prayer_review.png?updatedAt=1781391660128", label: "✨ Complete Prayer", text: "Masha'Allah! You've learned the core steps. Practice with love and devotion." }
    ];

    /* Nav buttons data (9 images, all link to abcofislam.com placeholder) */
    const navButtonsList = [
      { src: "https://ik.imagekit.io/4zbzbdytp/nav_button_5_prophet_stories.png", label: "Prophet Stories", url: "https://abcofislam.com" },
      { src: "https://ik.imagekit.io/4zbzbdytp/nav_button_3_five_pillars.png", label: "Five Pillars", url: "https://abcofislam.com" },
      { src: "https://ik.imagekit.io/4zbzbdytp/nav_button_6_yusuf_story.png", label: "Yusuf Story", url: "https://abcofislam.com" },
      { src: "https://ik.imagekit.io/4zbzbdytp/nav_button_9_good_manners.png", label: "Good Manners", url: "https://abcofislam.com" },
      { src: "https://ik.imagekit.io/4zbzbdytp/six_beliefs_nav_button(1).png", label: "Six Beliefs", url: "https://abcofislam.com" },
      { src: "https://ik.imagekit.io/4zbzbdytp/nav_button_4_quran_stories.png", label: "Quran Stories", url: "https://abcofislam.com" },
      { src: "https://ik.imagekit.io/4zbzbdytp/nav_button_8_daily_duas.png", label: "Daily Duas", url: "https://abcofislam.com" },
      { src: "https://ik.imagekit.io/4zbzbdytp/nav_button_7_how_to_pray.png", label: "How to Pray", url: "https://abcofislam.com" },
      { src: "https://ik.imagekit.io/4zbzbdytp/nav_button_2_six_beliefs.png", label: "Six Beliefs II", url: "https://abcofislam.com" }
    ];

    /* DOM references */
    const carouselEl  = document.getElementById("carousel");
    const dotsEl      = document.getElementById("dots");
    const prevBtn     = document.getElementById("prevBtn");
    const nextBtn     = document.getElementById("nextBtn");
    const curEl       = document.getElementById("cur");
    const totalEl     = document.getElementById("total");
    const captionEl   = document.getElementById("caption");
    const captionText = document.getElementById("captionText");
    const captionStep = captionEl.querySelector(".step");
    const autoplayBtn = document.getElementById("autoplayBtn");
    const autoplayIcon= document.getElementById("autoplayIcon");
    const progressEl  = document.getElementById("progress");
    const progressBar = progressEl.querySelector("i");
    const fsBtn       = document.getElementById("fsBtn");
    const voiceBtn    = document.getElementById("voiceBtn");
    const navRow      = document.getElementById("navButtonsRow");

    /* build slides & dots */
    const total = slides.length;
    totalEl.textContent = total;

    slides.forEach((s, i) => {
      const el = document.createElement("article");
      el.className = "slide";
      el.dataset.index = i;
      el.setAttribute("role", "group");
      el.setAttribute("aria-roledescription", "slide");
      el.setAttribute("aria-label", `${i + 1} of ${total}: ${s.label}`);
      el.innerHTML = `<img src="${s.src}" alt="${s.label} — ${s.text}" loading="${i === 0 ? "eager" : "lazy"}" />`;
      carouselEl.appendChild(el);

      const dot = document.createElement("button");
      dot.className = "dot";
      dot.dataset.index = i;
      dot.setAttribute("role", "tab");
      dot.setAttribute("aria-label", `Go to slide ${i + 1}: ${s.label}`);
      dotsEl.appendChild(dot);
    });

    const slideEls = Array.from(carouselEl.querySelectorAll(".slide"));
    const dotEls   = Array.from(dotsEl.querySelectorAll(".dot"));

    /* state */
    let index = 0;
    let autoplay = false;
    let progressRaf = null;
    const AUTOPLAY_MS = 5500;

    /* speech synthesis */
    let speechSynth = window.speechSynthesis;
    let currentUtterance = null;
    function stopSpeaking() { if (speechSynth && speechSynth.speaking) speechSynth.cancel(); }
    function readCurrentSlide() {
      if (!speechSynth) return alert("Speech not supported");
      stopSpeaking();
      const slide = slides[index];
      const textToRead = `${slide.label}. ${slide.text}`;
      const utterance = new SpeechSynthesisUtterance(textToRead);
      utterance.lang = "en-US";
      utterance.rate = 0.95;
      utterance.onend = () => { currentUtterance = null; };
      currentUtterance = utterance;
      speechSynth.speak(utterance);
    }

    function applyState() {
      slideEls.forEach((el, i) => {
        const diff = i - index;
        let state = "hidden";
        if (diff === 0) state = "active";
        else if (diff === -1) state = "prev";
        else if (diff === 1)  state = "next";
        else if (diff < -1)   state = "far-prev";
        else                  state = "far-next";
        el.dataset.state = state;
      });
      dotEls.forEach((d, i) => d.setAttribute("aria-current", i === index ? "true" : "false"));
      const s = slides[index];
      captionStep.textContent = s.label;
      captionText.textContent = s.text;
      curEl.textContent = index + 1;
      carouselEl.setAttribute("aria-label", `Slide ${index + 1} of ${total}: ${s.label}`);
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === total - 1;
      if (autoplay) startProgress(); else stopProgress();
    }

    function go(to) { index = Math.max(0, Math.min(total - 1, to)); applyState(); if (speechSynth?.speaking) speechSynth.cancel(); }
    function next() { if (index < total - 1) go(index + 1); else if (autoplay) go(0); }
    function prev() { if (index > 0) go(index - 1); }

    function setAutoplay(on) {
      autoplay = on;
      autoplayBtn.setAttribute("aria-pressed", String(on));
      autoplayIcon.setAttribute("d", on ? "M6 5h4v14H6zM14 5h4v14h-4z" : "M8 5v14l11-7z");
      if (on) startProgress(); else stopProgress();
    }
    function startProgress() {
      stopProgress();
      progressEl.classList.add("on");
      const start = performance.now();
      const tick = (now) => {
        const elapsed = (now - start);
        let t = Math.min(1, elapsed / AUTOPLAY_MS);
        progressBar.style.width = (t * 100) + "%";
        if (t < 1 && autoplay) progressRaf = requestAnimationFrame(tick);
        else if (t >= 1 && autoplay) next();
      };
      progressRaf = requestAnimationFrame(tick);
    }
    function stopProgress() {
      progressEl.classList.remove("on");
      if (progressRaf) cancelAnimationFrame(progressRaf);
      progressRaf = null;
      progressBar.style.width = "0%";
    }

    /* build nav buttons row (huge buttons) */
    navButtonsList.forEach(btn => {
      const link = document.createElement("a");
      link.href = btn.url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.className = "nav-icon-btn";
      link.setAttribute("aria-label", btn.label);
      const img = document.createElement("img");
      img.src = btn.src;
      img.alt = btn.label;
      img.loading = "lazy";
      link.appendChild(img);
      navRow.appendChild(link);
    });

    /* event listeners */
    prevBtn.addEventListener("click", () => { prev(); if (autoplay) startProgress(); });
    nextBtn.addEventListener("click", () => { next(); if (autoplay) startProgress(); });
    dotEls.forEach(d => d.addEventListener("click", () => { go(parseInt(d.dataset.index, 10)); if (autoplay) startProgress(); }));
    autoplayBtn.addEventListener("click", () => setAutoplay(!autoplay));
    fsBtn.addEventListener("click", () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); });
    voiceBtn.addEventListener("click", (e) => { e.stopPropagation(); readCurrentSlide(); });

    window.addEventListener("keydown", (e) => {
      if (e.target?.tagName === "INPUT") return;
      if (e.key === "ArrowRight" || e.key === "ArrowDown") { next(); if (autoplay) startProgress(); e.preventDefault(); }
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   { prev(); if (autoplay) startProgress(); e.preventDefault(); }
      if (e.key === "Home") { go(0);  if (autoplay) startProgress(); e.preventDefault(); }
      if (e.key === "End")  { go(total - 1); if (autoplay) startProgress(); e.preventDefault(); }
      if (e.key === " " || e.key === "Spacebar" || e.key.toLowerCase() === "p") { setAutoplay(!autoplay); e.preventDefault(); }
      if (e.key === "r" || e.key === "R") { readCurrentSlide(); e.preventDefault(); }
    });

    let startX = 0, dx = 0, dragging = false, dragged = false;
    const SWIPE_THRESHOLD = 55;
    const onStart = (x) => { dragging = true; dragged = false; startX = x; dx = 0; slideEls[index]?.classList.add("dragging"); stopProgress(); };
    const onMove = (x) => { if (!dragging) return; dx = x - startX; if (Math.abs(dx) > 5) dragged = true; };
    const onEnd = () => {
      if (!dragging) return;
      slideEls[index]?.classList.remove("dragging");
      dragging = false;
      if (Math.abs(dx) > SWIPE_THRESHOLD) { if (dx < 0) next(); else prev(); }
      dx = 0; dragged = false;
      if (autoplay) startProgress();
    };
    carouselEl.addEventListener("touchstart", (e) => onStart(e.touches[0].clientX), { passive: true });
    carouselEl.addEventListener("touchmove",  (e) => onMove(e.touches[0].clientX),  { passive: true });
    carouselEl.addEventListener("touchend",   onEnd);
    carouselEl.addEventListener("mousedown",  (e) => { onStart(e.clientX); e.preventDefault(); });
    window.addEventListener("mousemove",      (e) => onMove(e.clientX));
    window.addEventListener("mouseup",        onEnd);

    slideEls.forEach(el => el.addEventListener("click", (e) => {
      if (dragged) return;
      const rect = el.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      if (x > 0.6) next();
      else if (x < 0.4) prev();
      if (autoplay) startProgress();
    }));

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopProgress();
      else if (autoplay) startProgress();
    });

    applyState();
  </script>
</body>
</html>
